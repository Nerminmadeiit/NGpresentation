<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nada Presentation</title>
    <style>
      :root {
        --primary: #e6a4cb;
        --accent: #c20024;
        --secondary: #92001b;
        --neutral-light: #fff2f8;
        --neutral-dark: #1d1d1d;
        --paper: #fffafc;
        --shadow: 0 30px 90px rgba(29, 29, 29, 0.16);
        --radius: 32px;
        --gutter: clamp(1.25rem, 2vw, 2rem);
      }

      * {
        box-sizing: border-box;
      }

      html {
        scroll-behavior: smooth;
      }

      body {
        margin: 0;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        background:
          radial-gradient(
            circle at top left,
            rgba(230, 164, 203, 0.25),
            transparent 28%
          ),
          linear-gradient(180deg, #25181d 0%, #120f10 100%);
        color: var(--neutral-dark);
      }

      img,
      video {
        display: block;
        max-width: 100%;
      }

      .deck {
        position: relative;
      }

      .slide {
        position: sticky;
        top: 0;
        min-height: 100vh;
        padding: 0;
        display: flex;
        align-items: center;
        background-image: url(assets/img/Leaves\ 2\ 1.png);
      }

      .panel {
        width: 100%;
        min-height: 100vh;
        margin: 0;
        border-radius: 0;
        overflow: hidden;
        box-shadow: var(--shadow);
        position: relative;
        isolation: isolate;
        background-image: url(assets/img/Leaves\ 2\ 1.png);
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          135deg,
          rgba(255, 255, 255, 0.08),
          transparent 45%
        );
        pointer-events: none;
        z-index: 0;
      }

      .hero {
        color: white;
        background: #060506;
      }

      .hero-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: -2;
      }

      .video-audio-toggle {
        position: absolute;
        right: 1.5rem;
        bottom: 1.5rem;
        z-index: 2;
        border: 0;
        border-radius: 999px;
        padding: 0.8rem 1.1rem;
        background: rgba(20, 14, 17, 0.48);
        color: #fff;
        backdrop-filter: blur(12px);
        font: inherit;
        font-size: 0.95rem;
        letter-spacing: 0.04em;
        cursor: pointer;
        transition:
          background 0.2s ease,
          transform 0.2s ease;
      }

      .video-audio-toggle:hover,
      .video-audio-toggle:focus-visible {
        background: rgba(20, 14, 17, 0.72);
        transform: translateY(-1px);
      }

      .video-audio-toggle:focus-visible {
        outline: 2px solid rgba(255, 242, 248, 0.9);
        outline-offset: 3px;
      }

      h1,
      h2 {
        margin: 0;
        font-family: "Baskerville", "Iowan Old Style", "Times New Roman", serif;
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      h1 {
        font-size: clamp(3.8rem, 10vw, 7.6rem);
      }

      h2 {
        font-size: clamp(2.2rem, 5vw, 4rem);
      }

      .title-black h2 {
        color: #1d1d1d;
      }

      .title-red h2 {
        color: #c20024;
      }

      .title-pink h2 {
        color: #e6a4cb;
      }

      .content-panel {
        padding: clamp(1.5rem, 3vw, 2rem);
        display: grid;
        grid-template-columns: minmax(0, 1.1fr) minmax(320px, 0.9fr);
        gap: clamp(1.5rem, 3vw, 2.5rem);
        align-items: stretch;
        z-index: 1;
      }

      .deck .content-panel {
        background: linear-gradient(
          160deg,
          var(--neutral-light),
          #ffe5ef
        ) !important;
      }

      .title-only .content-panel {
        grid-template-columns: 1fr;
      }

      .title-only .media-column {
        display: none;
      }

      .title-only .text-column {
        min-height: calc(100vh - 3rem);
        align-content: center;
      }

      .text-column {
        display: grid;
        align-content: center;
        gap: 1.25rem;
        padding: clamp(1rem, 2vw, 1.5rem);
      }

      .slide-number {
        font-size: 0.92rem;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        opacity: 0.68;
      }

      .lead {
        margin: 0;
        font-size: clamp(1rem, 1.45vw, 1.15rem);
        line-height: 1.75;
        max-width: 58ch;
      }

      .bullet-list {
        margin: 0;
        padding-left: 1.2rem;
        display: grid;
        gap: 0.85rem;
        font-size: clamp(1rem, 1.4vw, 1.12rem);
        line-height: 1.65;
      }

      .media-column {
        display: grid;
        gap: 1rem;
        align-content: center;
        grid-template-columns: minmax(0, 1fr);
      }

      .media-column > * {
        grid-column: auto !important;
      }

      .image-slider {
        position: relative;
        min-height: clamp(260px, 50vh, 560px);
        width: 100%;
        border-radius: 26px;
        overflow: hidden;
        box-shadow: 0 22px 55px rgba(29, 29, 29, 0.14);
      }

      .slider-image {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        opacity: 0;
        transition: opacity 0.8s ease;
      }

      .slider-image.is-active {
        opacity: 1;
      }

      .slide:nth-of-type(6) .image-slider {
        min-height: clamp(320px, 62vh, 680px);
      }

      .slide:nth-of-type(6) .slider-image {
        object-position: center center;
        transform: scale(1.14);
        transform-origin: center center;
      }

      .media-card,
      .quote-card {
        min-height: 240px;
        border-radius: 26px;
        overflow: hidden;
        position: relative;
        box-shadow: 0 22px 55px rgba(29, 29, 29, 0.14);
      }

      .media-card img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .quote-card {
        padding: 1.5rem;
        display: grid;
        align-content: end;
        gap: 0.85rem;
      }

      .quote-card strong {
        font-size: 1.05rem;
        line-height: 1.4;
      }

      .quote-card span {
        font-size: 0.95rem;
        line-height: 1.6;
        opacity: 0.78;
      }

      .single-image .media-column {
        grid-template-columns: minmax(0, 1fr);
      }

      .accent-light {
        background: linear-gradient(160deg, var(--neutral-light), #ffe5ef);
      }

      .accent-primary {
        background: linear-gradient(160deg, #f5c2dd, var(--primary));
      }

      .accent-red {
        background: linear-gradient(160deg, #d5163d, var(--accent));
        color: white;
      }

      .accent-deep {
        background: linear-gradient(160deg, #a80424, var(--secondary));
        color: white;
      }

      .accent-dark {
        background: linear-gradient(160deg, #2d2d2d, var(--neutral-dark));
        color: white;
      }

      .accent-rose {
        background: linear-gradient(160deg, #ffe7f3, #ffd0e3);
      }

      .accent-soft {
        background: linear-gradient(160deg, #fff8fb, #f5dbe8);
      }

      .text-white .lead,
      .text-white .slide-number,
      .text-white .bullet-list {
        color: rgba(255, 255, 255, 0.92);
      }

      .text-white .slide-number {
        opacity: 0.85;
      }

      .span-two {
        grid-column: span 2;
      }

      @media (max-width: 960px) {
        .content-panel {
          grid-template-columns: 1fr;
        }

        .media-column,
        .single-image .media-column {
          grid-template-columns: 1fr;
        }

        .span-two {
          grid-column: auto;
        }

        .panel {
          min-height: auto;
        }

        .slide {
          min-height: auto;
        }
      }

      @media (max-width: 640px) {
        .slide {
          padding: 0;
        }

        .video-audio-toggle {
          right: 1rem;
          bottom: 1rem;
          padding: 0.72rem 0.95rem;
          font-size: 0.9rem;
        }

        .content-panel {
          padding: 1.25rem;
        }

        .media-card,
        .quote-card {
          min-height: 200px;
        }
      }
    </style>
  </head>

    <script>
      const heroVideo = document.querySelector(".hero-video");
      const audioToggle = document.querySelector(".video-audio-toggle");

      if (heroVideo) {
        const syncAudioButton = () => {
          if (!audioToggle) {
            return;
          }

          const isMuted = heroVideo.muted || heroVideo.volume === 0;
          audioToggle.textContent = isMuted ? "Unmute" : "Mute";
          audioToggle.setAttribute("aria-pressed", String(!isMuted));
          audioToggle.setAttribute(
            "aria-label",
            isMuted ? "Unmute video audio" : "Mute video audio",
          );
        };

        const tryPlayWithAudio = async () => {
          heroVideo.muted = false;
          heroVideo.volume = 1;
          syncAudioButton();

          try {
            await heroVideo.play();
          } catch (error) {
            heroVideo.muted = true;
            syncAudioButton();
            console.warn(
              "Autoplay with audio was blocked by the browser.",
              error,
            );
          }
        };

        if (audioToggle) {
          audioToggle.addEventListener("click", async () => {
            const shouldUnmute = heroVideo.muted || heroVideo.volume === 0;

            heroVideo.muted = !shouldUnmute;
            heroVideo.volume = shouldUnmute ? 1 : 0;
            syncAudioButton();

            if (shouldUnmute) {
              try {
                await heroVideo.play();
              } catch (error) {
                console.warn("Unable to resume video with audio.", error);
              }
            }
          });
        }

        if (heroVideo.readyState >= 2) {
          tryPlayWithAudio();
        } else {
          heroVideo.addEventListener("canplay", tryPlayWithAudio, {
            once: true,
          });
        }

        syncAudioButton();
      }

      const contentSlides = document.querySelectorAll(
        ".deck .slide:not([aria-label='Hero slide']) .content-panel",
      );

      contentSlides.forEach((panel) => {
        const mediaColumn = panel.querySelector(".media-column");
        if (!mediaColumn) {
          return;
        }

        const configuredSources =
          mediaColumn.getAttribute("data-slider-images");
        const foundImages = Array.from(mediaColumn.querySelectorAll("img"))
          .map((img) => img.getAttribute("src"))
          .filter(Boolean);

        let imageSources = [];

        if (configuredSources) {
          try {
            imageSources = JSON.parse(configuredSources);
          } catch (error) {
            imageSources = [];
          }
        }

        if (imageSources.length === 0) {
          imageSources = [...new Set(foundImages)];
        }

        mediaColumn.innerHTML = "";

        const slider = document.createElement("div");
        slider.className = "image-slider";

        imageSources.forEach((src, index) => {
          const image = document.createElement("img");
          image.className = "slider-image";
          if (index === 0) {
            image.classList.add("is-active");
          }
          image.src = src;
          image.alt = `Slide image ${index + 1}`;
          slider.appendChild(image);
        });

        mediaColumn.appendChild(slider);
      });

      document.querySelectorAll(".image-slider").forEach((slider) => {
        const images = slider.querySelectorAll(".slider-image");
        if (images.length < 2) {
          return;
        }

        let activeIndex = 0;

        setInterval(() => {
          images[activeIndex].classList.remove("is-active");
          activeIndex = (activeIndex + 1) % images.length;
          images[activeIndex].classList.add("is-active");
        }, 2000);
      });
    </script>
  </body>
</html>
